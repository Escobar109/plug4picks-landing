rmat('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* greek */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"4ab33b6f-8a2a-4345-a060-5db2c27e0ce6\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"123f383c-5ee6-4012-8654-a36e72400e52\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"3e24ac66-e5fd-4100-b535-9efcbe97414d\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"2748c0bc-9009-4b3a-b8cb-b48705d6ab35\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root {\n    --bg: #0A0907;\n    --text: #F5EFE3;\n    --textDim: rgba(245,239,227,0.62);\n    --textMute: rgba(245,239,227,0.36);\n    --border: rgba(255,235,200,0.10);\n    --borderHi: rgba(255,235,200,0.18);\n    --gold: #D4A94A;\n    --goldHi: #E8C467;\n    --green: #4ADE80;\n    --cyan: #3FD8FF;\n  }\n  *, *::before, *::after { box-sizing: border-box; }\n  html, body {\n    margin: 0; padding: 0; min-height: 100vh;\n    background: var(--bg); color: var(--text);\n    font-family: 'Inter', system-ui, sans-serif;\n    -webkit-font-smoothing: antialiased;\n    overflow-x: hidden;\n  }\n\n  /* ─── STORM LIGHTNING (atmospheric, realistic flashes) ──────── */\n  /* Real lightning: nearly invisible 95% of the time, brief bright flash\n     with a quick double-pulse, then long silence. Delayed start so the\n     intro animation owns the first 5 seconds. */\n  @keyframes lp-strike {\n    0%, 100% { opacity: 0; }\n    1.0%     { opacity: 1; }\n    1.4%     { opacity: 0.15; }\n    1.8%     { opacity: 0.95; }\n    2.4%     { opacity: 0.0; }\n    3.0%     { opacity: 0.55; }\n    3.4%     { opacity: 0; }\n  }\n  @keyframes lp-flash {\n    0%, 100% { opacity: 0; }\n    1.0%     { opacity: 0.14; }\n    1.8%     { opacity: 0.07; }\n    2.4%     { opacity: 0; }\n    3.0%     { opacity: 0.05; }\n    3.4%     { opacity: 0; }\n  }\n  .lp-bolt { animation: lp-strike 14s linear infinite; opacity: 0; animation-fill-mode: backwards; }\n  .lp-flash-overlay { animation: lp-flash 14s linear infinite; opacity: 0; animation-fill-mode: backwards; }\n  /* Bolts now wait for the intro animation (≈4s) before striking */\n  .lp-b1 { animation-delay: 6.0s;  }\n  .lp-b2 { animation-delay: 10.5s; }\n  .lp-b3 { animation-delay: 13.8s; }\n\n  /* ─── LOGO + HEADLINE REVEAL ────────────────────────────────── */\n  @keyframes halo-breathe {\n    0%, 100% { opacity: 0.65; transform: scale(1); }\n    50%      { opacity: 1;    transform: scale(1.06); }\n  }\n  .halo-breathe { animation: halo-breathe 4.2s ease-in-out infinite; }\n\n  @keyframes hero-line-up {\n    0%   { opacity: 0; transform: translateY(22px); }\n    100% { opacity: 1; transform: translateY(0); }\n  }\n  @keyframes plug-flicker {\n    0%   { opacity: 0; filter: brightness(0.2); }\n    8%   { opacity: 0.95; filter: brightness(2.2); }\n    14%  { opacity: 0.2; filter: brightness(0.4); }\n    22%  { opacity: 1; filter: brightness(2.4); }\n    30%  { opacity: 0.4; filter: brightness(0.6); }\n    42%  { opacity: 1; filter: brightness(1.8); }\n    55%  { opacity: 0.7; filter: brightness(1); }\n    100% { opacity: 1; filter: brightness(1); }\n  }\n  @keyframes logo-power-on {\n    0%, 45% { opacity: 0; transform: scale(0.88); filter: brightness(0.4); }\n    50%     { opacity: 0.85; transform: scale(1.04); filter: brightness(2); }\n    58%     { opacity: 0.2; filter: brightness(0.5); }\n    66%     { opacity: 1; filter: brightness(2.2); }\n    74%     { opacity: 0.5; filter: brightness(0.7); }\n    82%     { opacity: 1; filter: brightness(1.6); }\n    100%    { opacity: 1; transform: scale(1); filter: brightness(1); }\n  }\n  @keyframes pulse-dot-anim {\n    0%, 100% { opacity: 0.55; transform: scale(1); }\n    50%      { opacity: 1;    transform: scale(1.4); }\n  }\n  .pulse-dot { animation: pulse-dot-anim 1.6s ease-in-out infinite; }\n\n  /* ─── LAYOUT ────────────────────────────────────────────────── */\n  .page {\n    position: relative; min-height: 100vh;\n    display: flex; align-items: center; justify-content: center;\n    padding: 60px 24px 32px;\n    overflow: hidden;\n  }\n\n  .ambient-glow {\n    position: absolute; top: 50%; left: 50%;\n    transform: translate(-50%, -50%);\n    width: 1100px; height: 760px; pointer-events: none; z-index: 0;\n    background: radial-gradient(ellipse, rgba(212,169,74,0.16) 0%, rgba(74,222,128,0.06) 35%, transparent 65%);\n  }\n\n  .content {\n    position: relative; z-index: 5;\n    text-align: center;\n    max-width: 680px;\n    width: 100%;\n  }\n\n  /* Top chip */\n  .chip {\n    display: inline-flex; align-items: center; gap: 8px;\n    padding: 6px 14px; border-radius: 999px;\n    background: rgba(212,169,74,0.12);\n    border: 1px solid rgba(212,169,74,0.32);\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10.5px; font-weight: 700; letter-spacing: 1.6px;\n    color: var(--gold); text-transform: uppercase;\n    margin-bottom: 42px;\n    opacity: 0;\n    animation: hero-line-up 0.7s 0.05s cubic-bezier(0.2,0.8,0.2,1) forwards;\n  }\n  .chip .dot { width: 6px; height: 6px; border-radius: 6px; background: var(--gold); box-shadow: 0 0 8px var(--gold); }\n\n  /* COMING SOON wordmark — gradient text */\n  .coming-soon {\n    display: block;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: clamp(18px, 2.2vw, 26px);\n    font-weight: 800; letter-spacing: 8px;\n    background: linear-gradient(90deg, var(--goldHi) 0%, var(--gold) 50%, var(--green) 100%);\n    -webkit-background-clip: text; background-clip: text;\n    -webkit-text-fill-color: transparent; color: transparent;\n    filter: drop-shadow(0 0 16px rgba(212,169,74,0.35));\n    margin-bottom: 36px;\n    opacity: 0;\n    animation: hero-line-up 0.8s 0.45s cubic-bezier(0.2,0.8,0.2,1) forwards;\n  }\n\n  /* Headline lines */\n  .h1 {\n    font-family: 'Instrument Serif', serif;\n    font-size: clamp(54px, 8.5vw, 96px);\n    line-height: 0.98; letter-spacing: -2.2;\n    font-weight: 400;\n    margin: 0 0 28px;\n  }\n  .hero-line {\n    display: block;\n    opacity: 0; transform: translateY(22px);\n    animation: hero-line-up 0.75s cubic-bezier(0.2,0.8,0.2,1) forwards;\n  }\n  .hero-line-1 { animation-delay: 0.85s; }\n  .hero-line-2 { animation-delay: 1.25s; }\n  .hero-line-plug {\n    display: block;\n    opacity: 0;\n    background: linear-gradient(90deg, #E8C467 0%, #FFD24A 25%, #4ADE80 70%, #3FD8FF 100%);\n    -webkit-background-clip: text; background-clip: text;\n    -webkit-text-fill-color: transparent; color: transparent;\n    filter: drop-shadow(0 0 18px rgba(74,222,128,0.55)) drop-shadow(0 0 36px rgba(255,210,74,0.35));\n    animation: plug-flicker 1.6s 1.7s linear forwards;\n    font-style: italic;\n    font-size: clamp(62px, 9.6vw, 116px);\n    letter-spacing: -2.6;\n    margin-top: 0.06em;\n  }\n\n  /* Logo block */\n  .logo-wrap {\n    position: relative; width: 360px; height: 360px;\n    margin: 8px auto 30px;\n    opacity: 0;\n    animation: logo-power-on 1.6s 1.7s linear forwards;\n  }\n  .logo-halo {\n    position: absolute; inset: -130px; pointer-events: none; z-index: 0;\n    background: radial-gradient(circle, rgba(74,222,128,0.42) 0%, rgba(74,222,128,0.18) 28%, rgba(74,222,128,0.05) 50%, transparent 70%);\n    filter: blur(8px);\n  }\n  .logo-rim {\n    position: absolute; inset: -60px; pointer-events: none; z-index: 0;\n    background: radial-gradient(circle, rgba(212,169,74,0.28) 0%, transparent 55%);\n  }\n  .logo-img {\n    position: relative; z-index: 2;\n    width: 100%; height: 100%;\n    border-radius: 28px; display: block;\n    box-shadow:\n      0 0 0 1px rgba(74,222,128,0.55),\n      0 0 60px rgba(74,222,128,0.45),\n      0 30px 70px rgba(0,0,0,0.55);\n  }\n\n  .tagline {\n    font-family: 'Inter'; font-size: 18px;\n    color: var(--text); line-height: 1.55;\n    max-width: 540px; margin: 30px auto 0;\n    text-wrap: pretty;\n    opacity: 0;\n    animation: hero-line-up 0.8s 3.0s cubic-bezier(0.2,0.8,0.2,1) forwards;\n  }\n  .tagline em { color: var(--gold); font-style: italic; font-weight: 600; }\n  .tagline .accent-green { color: var(--green); font-weight: 700; }\n\n  /* Social row */\n  .socials {\n    display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;\n    margin-top: 16px;\n    opacity: 0;\n    animation: hero-line-up 0.8s 3.6s cubic-bezier(0.2,0.8,0.2,1) forwards;\n  }\n  .social {\n    display: inline-flex; align-items: center; gap: 10px;\n    padding: 14px 20px; border-radius: 12px;\n    background: rgba(20,17,13,0.65);\n    backdrop-filter: blur(12px);\n    -webkit-backdrop-filter: blur(12px);\n    border: 1px solid var(--border);\n    color: var(--text); text-decoration: none;\n    font-family: 'Inter'; font-size: 14px; font-weight: 600;\n    transition: transform 160ms ease, border-color 160ms ease, background 160ms ease, box-shadow 160ms ease;\n    min-width: 168px;\n    justify-content: flex-start;\n  }\n  .social:hover {\n    transform: translateY(-2px);\n    border-color: var(--borderHi);\n    background: rgba(30,26,20,0.85);\n    box-shadow: 0 12px 32px rgba(0,0,0,0.45), 0 0 0 1px var(--accent, var(--borderHi));\n  }\n  .social .icon {\n    display: inline-flex; align-items: center; justify-content: center;\n    width: 32px; height: 32px; border-radius: 8px;\n    background: rgba(255,255,255,0.04);\n    color: var(--accent, var(--text));\n    flex-shrink: 0;\n  }\n  .social .label {\n    display: flex; flex-direction: column; align-items: flex-start; gap: 1px;\n  }\n  .social .net {\n    font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 800;\n    letter-spacing: 1.6px; color: var(--textMute); text-transform: uppercase;\n  }\n  .social .handle {\n    font-size: 14px; font-weight: 700; color: var(--text);\n  }\n  .social-x  { --accent: #FFFFFF; }\n  .social-ig { --accent: #E1306C; }\n  .social-tg { --accent: #29B6F6; }\n\n  /* Rotating COMING SOON phrase */\n  .phrase-track {\n    position: relative;\n    display: block;\n    height: 1.3em;\n    margin-bottom: 36px;\n  }\n  .phrase-item {\n    position: absolute; left: 0; right: 0; top: 0;\n    display: flex; align-items: center; justify-content: center;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: clamp(18px, 2.2vw, 26px);\n    font-weight: 800; letter-spacing: 8px;\n    background: linear-gradient(90deg, var(--goldHi) 0%, var(--gold) 50%, var(--green) 100%);\n    -webkit-background-clip: text; background-clip: text;\n    -webkit-text-fill-color: transparent; color: transparent;\n    filter: drop-shadow(0 0 16px rgba(212,169,74,0.35));\n    opacity: 0;\n  }\n  /* 2 phrases, each visible for ~3.5s on a 8s cycle */\n  @keyframes phrase-1 {\n    0%, 44%   { opacity: 1; transform: translateY(0); }\n    50%, 96%  { opacity: 0; transform: translateY(-6px); }\n    100%      { opacity: 1; transform: translateY(0); }\n  }\n  @keyframes phrase-2 {\n    0%, 44%   { opacity: 0; transform: translateY(6px); }\n    50%, 96%  { opacity: 1; transform: translateY(0); }\n    100%      { opacity: 0; transform: translateY(-6px); }\n  }\n  .phrase-1 { animation: phrase-1 8s 0.45s linear infinite; }\n  .phrase-2 { animation: phrase-2 8s 0.45s linear infinite; }\n\n  /* \"For now, enjoy some free picks\" line is now in tagline; remove standalone style */\n  .free-picks { display: none; }\n\n  /* WEEKLY RESULTS CARD — app-style breakdown */\n  .weekly-card {\n    position: relative;\n    margin: 38px auto 0;\n    max-width: 600px;\n    padding: 22px 22px 16px;\n    border-radius: 16px;\n    background: linear-gradient(170deg, rgba(74,222,128,0.07) 0%, rgba(20,17,13,0.82) 60%);\n    backdrop-filter: blur(14px);\n    -webkit-backdrop-filter: blur(14px);\n    border: 1px solid rgba(74,222,128,0.28);\n    box-shadow:\n      0 30px 60px rgba(0,0,0,0.5),\n      0 0 40px rgba(74,222,128,0.08);\n    text-align: left;\n    opacity: 0;\n    animation: hero-line-up 0.8s 3.15s cubic-bezier(0.2,0.8,0.2,1) forwards;\n  }\n  .weekly-head {\n    display: flex; align-items: center; justify-content: space-between;\n    padding-bottom: 14px; margin-bottom: 14px;\n    border-bottom: 1px solid var(--border);\n  }\n  .weekly-label {\n    display: inline-flex; align-items: center; gap: 8px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px; font-weight: 800; letter-spacing: 1.6px;\n    color: var(--green); text-transform: uppercase;\n  }\n  .weekly-label .dot {\n    width: 6px; height: 6px; border-radius: 6px;\n    background: var(--green); box-shadow: 0 0 8px var(--green);\n  }\n  .weekly-range {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10.5px; font-weight: 700; letter-spacing: 1px;\n    color: var(--textDim); text-transform: uppercase;\n  }\n  .weekly-hero {\n    display: flex; align-items: baseline; gap: 22px;\n    padding-bottom: 16px;\n    border-bottom: 1px solid var(--border);\n    margin-bottom: 14px;\n  }\n  .weekly-record {\n    font-family: 'Instrument Serif', serif;\n    font-size: 56px; line-height: 0.9; letter-spacing: -1.6px;\n    color: var(--gold);\n    text-shadow: 0 0 24px rgba(212,169,74,0.35);\n  }\n  .weekly-meta { display: flex; flex-direction: column; gap: 4px; }\n  .weekly-units {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 20px; font-weight: 800; letter-spacing: -0.5px;\n  }\n  .weekly-units.pos { color: var(--green); text-shadow: 0 0 18px rgba(74,222,128,0.35); }\n  .weekly-units.neg { color: #F87171; }\n  .weekly-hit {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px; font-weight: 700; letter-spacing: 1.4px;\n    color: var(--textMute); text-transform: uppercase;\n  }\n  .weekly-breakdown-label {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 9.5px; font-weight: 800; letter-spacing: 1.8px;\n    color: var(--textDim); text-transform: uppercase;\n    margin-bottom: 10px;\n  }\n  .weekly-stats {\n    display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;\n    margin-bottom: 14px;\n  }\n  .stat-card {\n    padding: 9px 7px 10px; border-radius: 10px;\n    background: rgba(255,235,200,0.025);\n    border: 1px solid var(--border);\n    text-align: left;\n  }\n  .stat-card[data-cat=\"sides\"]   { --c-accent: #3FD8FF; }\n  .stat-card[data-cat=\"totals\"]  { --c-accent: #FFD24A; }\n  .stat-card[data-cat=\"props\"]   { --c-accent: #4ADE80; }\n  .stat-card[data-cat=\"batter\"]  { --c-accent: #4ADE80; }\n  .stat-card[data-cat=\"pitcher\"] { --c-accent: #FB923C; }\n  .stat-card[data-cat=\"overall\"] { --c-accent: #F5EFE3; }\n  .stat-k {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 9px; font-weight: 800; letter-spacing: 1.2px;\n    color: var(--textMute); text-transform: uppercase;\n    margin-bottom: 6px;\n  }\n  .stat-rec {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 16px; font-weight: 800;\n    color: var(--c-accent, var(--text));\n    line-height: 1;\n  }\n  .stat-pct {\n    display: inline-block; margin-left: 4px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px; font-weight: 700;\n    color: var(--textDim);\n  }\n  .stat-u {\n    margin-top: 6px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 12px; font-weight: 800;\n  }\n  .stat-u.pos { color: var(--green); }\n  .stat-u.neg { color: #F87171; }\n  .weekly-nav {\n    display: flex; align-items: center; justify-content: space-between;\n    padding-top: 12px;\n    border-top: 1px solid var(--border);\n    gap: 12px;\n  }\n  .weekly-nav-btn {\n    padding: 7px 12px; border-radius: 8px;\n    background: rgba(255,235,200,0.04);\n    border: 1px solid var(--border);\n    color: var(--text);\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10.5px; font-weight: 800; letter-spacing: 1px;\n    cursor: pointer;\n    text-transform: uppercase;\n    transition: background 140ms ease, border-color 140ms ease, color 140ms ease, transform 140ms ease;\n  }\n  .weekly-nav-btn:hover:not(:disabled) {\n    background: rgba(212,169,74,0.10);\n    border-color: rgba(212,169,74,0.35);\n    color: var(--gold);\n    transform: translateY(-1px);\n  }\n  .weekly-nav-btn:disabled {\n    opacity: 0.3; cursor: not-allowed;\n  }\n  .weekly-nav-range {\n    font-family: 'Instrument Serif', serif; font-style: italic;\n    font-size: 15px; color: var(--text);\n    text-align: center; flex: 1;\n  }\n\n  /* TWO-BOX CTA ROW: gold socials + blue telegram */\n  .cta-row {\n    margin: 32px auto 0;\n    max-width: 720px;\n    display: grid; grid-template-columns: 1fr 1fr; gap: 14px;\n    opacity: 0;\n    animation: hero-line-up 0.8s 3.6s cubic-bezier(0.2,0.8,0.2,1) forwards;\n  }\n  .cta-box {\n    position: relative;\n    padding: 22px 22px 20px;\n    border-radius: 14px;\n    backdrop-filter: blur(14px);\n    -webkit-backdrop-filter: blur(14px);\n    text-align: left;\n    display: flex; flex-direction: column;\n  }\n  .cta-box-gold {\n    background: linear-gradient(160deg, rgba(212,169,74,0.10) 0%, rgba(20,17,13,0.78) 60%);\n    border: 1px solid rgba(212,169,74,0.42);\n    box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 30px rgba(212,169,74,0.10);\n  }\n  .cta-box-blue {\n    background: linear-gradient(160deg, rgba(41,182,246,0.12) 0%, rgba(20,17,13,0.78) 60%);\n    border: 1px solid rgba(41,182,246,0.45);\n    box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 30px rgba(41,182,246,0.12);\n  }\n  .cta-badge {\n    position: absolute; top: 12px; right: 12px;\n    padding: 3px 9px; border-radius: 999px;\n    background: var(--green); color: #051628;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 9.5px; font-weight: 800; letter-spacing: 1.4px;\n    box-shadow: 0 4px 14px rgba(74,222,128,0.45);\n  }\n  .cta-head {\n    font-family: 'Instrument Serif', serif; font-style: italic;\n    font-size: clamp(22px, 2.4vw, 26px);\n    color: var(--text);\n    line-height: 1.1;\n    margin-bottom: 4px;\n  }\n  .cta-box-gold .cta-head { color: var(--goldHi); }\n  .cta-box-blue .cta-head { color: #5CC8F7; }\n  .cta-sub {\n    font-family: 'Inter'; font-size: 13px;\n    color: var(--textDim); font-weight: 500;\n    margin-bottom: 16px;\n  }\n  .cta-buttons {\n    display: flex; flex-direction: column; gap: 8px;\n    margin-top: auto;\n  }\n  .cta-btn {\n    display: inline-flex; align-items: center; gap: 10px;\n    padding: 11px 14px; border-radius: 9px;\n    font-family: 'Inter'; font-size: 13px; font-weight: 700;\n    text-decoration: none;\n    transition: transform 140ms ease, filter 140ms ease, box-shadow 140ms ease;\n    justify-content: center;\n  }\n  .cta-btn:hover { transform: translateY(-2px); filter: brightness(1.08); }\n  .cta-btn-x {\n    background: rgba(255,255,255,0.06);\n    border: 1px solid rgba(255,255,255,0.18);\n    color: #FFFFFF;\n  }\n  .cta-btn-x:hover { background: rgba(255,255,255,0.10); box-shadow: 0 0 0 1px rgba(255,255,255,0.30); }\n  .cta-btn-ig {\n    background: linear-gradient(135deg, rgba(225,48,108,0.20) 0%, rgba(255,160,80,0.15) 100%);\n    border: 1px solid rgba(225,48,108,0.38);\n    color: #F8B0CB;\n  }\n  .cta-btn-ig:hover { box-shadow: 0 0 0 1px rgba(225,48,108,0.55); }\n  .cta-btn-tg {\n    background: linear-gradient(180deg, #29B6F6 0%, #1E9DD7 100%);\n    color: #051628;\n    box-shadow: 0 8px 24px rgba(41,182,246,0.32);\n    font-weight: 800;\n  }\n  .cta-btn-tg:hover { box-shadow: 0 12px 30px rgba(41,182,246,0.45); }\n\n  /* Email form (now under tagline, near middle of page) */\n  .email-section {\n    margin-top: 26px;\n    opacity: 0;\n    animation: hero-line-up 0.7s 3.25s cubic-bezier(0.2,0.8,0.2,1) forwards;\n  }\n  .email-label {\n    display: inline-flex; align-items: center; gap: 7px;\n    padding: 4px 11px; border-radius: 999px;\n    background: rgba(74,222,128,0.12);\n    border: 1px solid rgba(74,222,128,0.3);\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px; font-weight: 700; letter-spacing: 1.4px;\n    color: var(--green); text-transform: uppercase;\n    margin-bottom: 14px;\n  }\n  .email-label .dot { width: 5px; height: 5px; border-radius: 5px; background: var(--green); box-shadow: 0 0 6px var(--green); }\n  .email-form {\n    display: flex; gap: 8px; justify-content: center;\n    max-width: 440px; margin: 0 auto;\n  }\n  .email-input {\n    flex: 1; min-width: 0;\n    padding: 13px 16px; border-radius: 10px;\n    background: rgba(20,17,13,0.7);\n    backdrop-filter: blur(12px);\n    -webkit-backdrop-filter: blur(12px);\n    border: 1px solid var(--border);\n    color: var(--text);\n    font-family: 'Inter'; font-size: 14px; font-weight: 500;\n    outline: none;\n    transition: border-color 160ms ease, box-shadow 160ms ease;\n  }\n  .email-input::placeholder { color: var(--textMute); }\n  .email-input:focus {\n    border-color: rgba(74,222,128,0.55);\n    box-shadow: 0 0 0 3px rgba(74,222,128,0.18);\n  }\n  .email-btn {\n    padding: 13px 20px; border-radius: 10px;\n    background: var(--gold); color: #0A0907;\n    font-family: 'Inter'; font-size: 14px; font-weight: 800; ction (cat) {\n        const cap = cat.charAt(0).toUpperCase() + cat.slice(1);\n        const data = w[cat];\n        document.getElementById('stat' + cap + 'Rec').textContent = rec(data);\n        document.getElementById('stat' + cap + 'Pct').textContent = '(' + pct(data.w, data.l) + ')';\n        const u = document.getElementById('stat' + cap + 'U');\n        u.textContent = fmtU(data.u);\n        u.className = 'stat-u ' + uClass(data.u);\n      });\n\n      document.getElementById('prevWeek').disabled = idx >= WEEKS.length - 1;\n      document.getElementById('nextWeek').disabled = idx <= 0;\n    }\n\n    document.getElementById('prevWeek').addEventListener('click', function () {\n      if (idx < WEEKS.length - 1) { idx++; renderWeek(); }\n    });\n    document.getElementById('nextWeek').addEventListener('click', function () {\n      if (idx > 0) { idx--; renderWeek(); }\n    });\n    renderWeek();\n  <\u002Fscript>\n\n  <script>\n    // Email form: optimistic success state. If you wire it to Formspree/Mailchimp,\n    // it'll submit normally; otherwise this just shows a thank-you.\n    (function () {\n      var form = document.getElementById('emailForm');\n      var success = document.getElementById('emailSuccess');\n      if (!form) return;\n      form.addEventListener('submit', function (e) {\n        // If action still has the placeholder, prevent default and just show success.\n        var isPlaceholder = /YOUR_FORM_ID|^$/.test(form.getAttribute('action') || '');\n        if (isPlaceholder) {\n          e.preventDefault();\n        }\n        form.classList.add('submitted');\n        success.classList.add('show');\n      });\n    })();\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
