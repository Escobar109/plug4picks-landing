<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Plug4Picks — Coming Soon</title>

<template id="__bundler_thumbnail" data-bg-color="#0A0907">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#FFD56B"/>
        <stop offset="55%" stop-color="#E8C467"/>
        <stop offset="100%" stop-color="#B8902F"/>
      </linearGradient>
      <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#9BF0C0"/>
        <stop offset="100%" stop-color="#4ADE80"/>
      </linearGradient>
      <radialGradient id="halo" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="rgba(74,222,128,0.4)"/>
        <stop offset="100%" stop-color="rgba(74,222,128,0)"/>
      </radialGradient>
    </defs>
    <ellipse cx="600" cy="400" rx="520" ry="320" fill="url(#halo)"/>
    <path d="M 640 220 L 530 410 L 600 410 L 530 580 L 680 380 L 600 380 Z"
          fill="url(#gold)" opacity="0.95"/>
    <text x="380" y="500" font-family="Georgia, serif" font-style="italic"
          font-size="280" font-weight="400" fill="url(#gold)" letter-spacing="-8">P</text>
    <text x="720" y="500" font-family="Georgia, serif" font-style="italic"
          font-size="280" font-weight="400" fill="url(#green)" letter-spacing="-8">4</text>
  </svg>
</template>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<!-- Bundler-friendly logo source: bundler scans img src natively and replaces with a blob URL -->
<img id="logoSrc" src="./plug4picks-logo.jpeg" alt="" style="display:none" aria-hidden="true"/>
<div class="page">
  <div id="storm"></div>
  <div class="content">

    <!-- ── HERO + EMAIL ── -->
    <div id="hero"></div>
    <div id="email"></div>

    <!-- ── TRACKED RECORD ── -->
    <div class="section-divider"><span class="section-eyebrow"><span class="bolt">⚡</span>Tracked Record<span class="eyebrow-tag">· Updated Weekly</span></span></div>
    <div id="season"></div>
    <div id="weekly"></div>

    <!-- ── BANKROLL & UNIT CALCULATOR ── -->
    <div class="section-divider"><span class="section-eyebrow"><span class="bolt">⚡</span>Free Tool</span></div>
    <div class="section-header" id="tool">
      <h2 class="section-title">What's a <em>Bankroll</em> &amp; <span class="green">Unit Size</span>?</h2>
      <p class="section-sub">Your <strong>bankroll</strong> is your total betting stash — not your daily spend. Using <strong>units</strong> (a % of your bankroll) builds long-term success and weathers any bad streak.</p>
    </div>
    <div id="calc"></div>

    <!-- ── CTAs ── -->
    <div class="section-divider" id="stayPlugged"><span class="section-eyebrow"><span class="bolt">⚡</span>Stay Plugged</span></div>
    <div id="cta"></div>

    <div id="foot"></div>
  </div>
</div>

<!-- ── Floating Telegram FAB — bottom-right wayfinder ── -->
<a href="#stayPlugged" class="telegram-fab" id="telegramFab" aria-label="Free Picks via Telegram">
  <span class="fab-emoji" aria-hidden="true">🔌</span>
  <span class="fab-label">Free Picks</span>
  <span class="fab-tg" aria-hidden="true">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M21.93 4.34a1.4 1.4 0 0 0-1.85-1.39L2.6 9.78a1 1 0 0 0 .08 1.88l4.4 1.46 1.7 5.45a.8.8 0 0 0 1.32.32l2.66-2.47 4.55 3.34a1.4 1.4 0 0 0 2.18-.81z"/></svg>
  </span>
</a>

<script src="partials.js"></script>
<script>
  var __logoEl = document.getElementById('logoSrc');
  var __logoSrc = __logoEl ? __logoEl.currentSrc || __logoEl.src : '';
  document.getElementById('storm').innerHTML  = buildStormOverlay();
  document.getElementById('hero').innerHTML   = buildHero({ logoSrc: __logoSrc });
  document.getElementById('email').innerHTML  = buildEmailForm();
  document.getElementById('season').innerHTML = buildSeasonCard();
  document.getElementById('weekly').innerHTML = buildWeeklyCard();
  document.getElementById('calc').innerHTML   = buildCalcCardSideBySide();
  document.getElementById('cta').innerHTML    = buildCtaRow();
  document.getElementById('foot').innerHTML   = buildFoot();
</script>
<script src="app.js"></script>
<script>
  // ── Telegram FAB: scroll-to-CTA + auto-hide when CTAs visible ──
  (function () {
    const fab = document.getElementById('telegramFab');
    const ctaSection = document.querySelector('.cta-row');
    if (!fab) return;
    fab.addEventListener('click', function (e) {
      e.preventDefault();
      const target = document.getElementById('stayPlugged') || ctaSection;
      if (!target) return;
      const rect = target.getBoundingClientRect();
      const y = window.scrollY + rect.top - 40;
      window.scrollTo({ top: y, behavior: 'smooth' });
    });
    if (ctaSection && 'IntersectionObserver' in window) {
      const obs = new IntersectionObserver(function (entries) {
        entries.forEach(function (en) { fab.classList.toggle('hidden', en.isIntersecting); });
      }, { rootMargin: '0px 0px -10% 0px', threshold: 0.15 });
      obs.observe(ctaSection);
    }
  })();
</script>
</body>
</html>
